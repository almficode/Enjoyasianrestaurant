<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="Fabicon.png">
  <link rel="apple-touch-icon" href="Fabicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — ENJOY Asian Restaurant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&family=Noto+Serif+JP:wght@200;300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .gallery-hero {
      position: relative;
      padding: 7rem 5% 3.5rem;
      background: var(--bg-soft);
      border-bottom: 1px solid var(--bg-border);
      overflow: hidden;
    }
    .gallery-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(109,63,192,0.08), transparent);
      pointer-events: none;
    }
    .gallery-hero-back {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-family: var(--font-ui); font-size: 0.52rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--silver-muted); margin-bottom: 1.5rem;
      transition: color var(--t-fast);
    }
    .gallery-hero-back:hover { color: var(--accent-pale); }
    .gallery-hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 5vw, 4.5rem);
      font-weight: 300; line-height: 1.05; color: var(--white);
    }
    .gallery-hero-title em { font-style: italic; color: var(--accent-pale); }
    .gallery-hero-sub {
      font-family: var(--font-display); font-style: italic; font-weight: 300;
      font-size: clamp(0.9rem, 1.6vw, 1.15rem);
      color: var(--silver-dim); margin-top: 0.8rem;
    }
    .gallery-page-body {
      padding: 4rem 5% 6rem;
      max-width: 1380px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div id="wa-float">
  <div class="wa-tooltip">Call us</div>
  <a href="tel:+34646906897" class="wa-bubble" aria-label="Call us">📞</a>
</div>

<!-- Navbar -->
<nav id="navbar" class="scrolled">
  <div class="nav-logo">
    <a href="index.html" style="text-decoration:none">
      <div class="nav-logo-enjoy">ENJOY</div>
      <div class="nav-logo-sub">Asian Restaurant</div>
    </a>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="menu.html">Menu</a></li>
    <li><a href="index.html#chefs">Chefs</a></li>
    <li><a href="gallery.html" style="color:var(--accent-pale)" data-i18n="nav_gallery">Gallery</a></li>
    <li><a href="ai.html">AI Assistant</a></li>
    <li><a href="tel:+34646906897" class="nav-reserve">Reserve</a></li>
  </ul>
  <div class="lang-selector" id="langSelector">
    <button class="lang-selector-btn" id="langSelectorBtn" onclick="toggleLangDropdown()">
      <span class="lang-globe">🌐</span>
      <span class="lang-current" id="langCurrent">EN</span>
      <span class="lang-chevron" id="langChevron">›</span>
    </button>
    <div class="lang-dropdown" id="langDropdown">
      <button class="lang-option active" id="lang-en" onclick="setLang('en');toggleLangDropdown()">
        <span class="lang-flag">🇬🇧</span><span class="lang-name">English</span><span class="lang-check">✓</span>
      </button>
      <button class="lang-option" id="lang-es" onclick="setLang('es');toggleLangDropdown()">
        <span class="lang-flag">🇪🇸</span><span class="lang-name">Español</span><span class="lang-check">✓</span>
      </button>
      <button class="lang-option" id="lang-de" onclick="setLang('de');toggleLangDropdown()">
        <span class="lang-flag">🇩🇪</span><span class="lang-name">Deutsch</span><span class="lang-check">✓</span>
      </button>
      <button class="lang-option" id="lang-fr" onclick="setLang('fr');toggleLangDropdown()">
        <span class="lang-flag">🇫🇷</span><span class="lang-name">Français</span><span class="lang-check">✓</span>
      </button>
    </div>
  </div>
  <div class="hamburger" id="hamburger" role="button" tabindex="0">
    <span></span><span></span><span></span>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html" onclick="closeMobileMenu()">Home</a>
  <a href="menu.html" onclick="closeMobileMenu()">Menu</a>
  <a href="tel:+34646906897" onclick="closeMobileMenu()">Reserve</a>
  <a href="tel:+34646906897">Call us</a>
  <div class="mobile-lang-row">
    <button class="mobile-lang-opt active" id="mob-lang-en" onclick="setLang('en');closeMobileMenu()">🇬🇧 EN</button>
    <button class="mobile-lang-opt" id="mob-lang-es" onclick="setLang('es');closeMobileMenu()">🇪🇸 ES</button>
    <button class="mobile-lang-opt" id="mob-lang-de" onclick="setLang('de');closeMobileMenu()">🇩🇪 DE</button>
    <button class="mobile-lang-opt" id="mob-lang-fr" onclick="setLang('fr');closeMobileMenu()">🇫🇷 FR</button>
  </div>
</div>

<!-- Hero -->
<div class="gallery-hero">
  <a href="index.html" class="gallery-hero-back">← Back to ENJOY</a>
  <h1 class="gallery-hero-title">Life at <em>ENJOY</em></h1>
  <p class="gallery-hero-sub">A visual journey through our kitchen, our team and the moments that make ENJOY unforgettable.</p>
</div>

<!-- Gallery -->
<div class="gallery-page-body">
  <div class="gallery-masonry reveal">
    <div class="gallery-item" onclick="openLightbox('https://www.enjoyasianrestaurant.com/images/Restaurante/Interior/foto-interior.jpg')">
      <div class="gallery-img" style="background-image:url('https://www.enjoyasianrestaurant.com/images/Restaurante/Interior/foto-interior.jpg')"></div>
      <div class="gallery-item-overlay"><div class="gallery-zoom">+</div></div>
    </div>
    <div class="gallery-item" onclick="openLightbox('https://www.enjoyasianrestaurant.com/images/Restaurante/teppanyaki_lanzarote_red.jpg')">
      <div class="gallery-img" style="background-image:url('https://www.enjoyasianrestaurant.com/images/Restaurante/teppanyaki_lanzarote_red.jpg')"></div>
      <div class="gallery-item-overlay"><div class="gallery-zoom">+</div></div>
    </div>
    <div class="gallery-item" onclick="openLightbox('Tartar Sake.png')">
      <div class="gallery-img" style="background-image:url('Tartar Sake.png')"></div>
      <div class="gallery-item-overlay"><div class="gallery-zoom">+</div></div>
    </div>
    <div class="gallery-item" onclick="openLightbox('Ikura (2pc).png')">
      <div class="gallery-img" style="background-image:url('Ikura (2pc).png')"></div>
      <div class="gallery-item-overlay"><div class="gallery-zoom">+</div></div>
    </div>
    <div class="gallery-item" onclick="openLightbox('https://www.enjoyasianrestaurant.com/images/Restaurante/cocina_abierta.jpg')">
      <div class="gallery-img" style="background-image:url('https://www.enjoyasianrestaurant.com/images/Restaurante/cocina_abierta.jpg')"></div>
      <div class="gallery-item-overlay"><div class="gallery-zoom">+</div></div>
    </div>
    <div class="gallery-item" onclick="openLightbox('https://www.enjoyasianrestaurant.com/images/Restaurante/all%20staff%20kitchen%20lanzarote.jpg')">
      <div class="gallery-img" style="background-image:url('https://www.enjoyasianrestaurant.com/images/Restaurante/all%20staff%20kitchen%20lanzarote.jpg')"></div>
      <div class="gallery-item-overlay"><div class="gallery-zoom">+</div></div>
    </div>
    <div class="gallery-item" onclick="openLightbox('facade-day.jpg')">
      <div class="gallery-img" style="background-image:url('facade-day.jpg')"></div>
      <div class="gallery-item-overlay"><div class="gallery-zoom">+</div></div>
    </div>
    <div class="gallery-item" onclick="openLightbox('hero-teppanyaki.jpg')">
      <div class="gallery-img" style="background-image:url('hero-teppanyaki.jpg')"></div>
      <div class="gallery-item-overlay"><div class="gallery-zoom">+</div></div>
    </div>
    <div class="gallery-item" onclick="openLightbox('hero-sushi.jpg')">
      <div class="gallery-img" style="background-image:url('hero-sushi.jpg')"></div>
      <div class="gallery-item-overlay"><div class="gallery-zoom">+</div></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <div class="lightbox-close" onclick="closeLightbox()" aria-label="Close">✕</div>
  <div id="lightboxImg"></div>
</div>

<script src="script.js"></script>
</body>
</html>
